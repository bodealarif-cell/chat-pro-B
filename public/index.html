<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Discord Style Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h2>🔐 تسجيل دخول</h2>
  <input id="username" placeholder="اسمك" />
  <input id="code" placeholder="كود الدخول" />
  <input id="avatar" placeholder="رابط صورة (اختياري)" />
  <button id="loginBtn">دخول</button>
  <p id="error"></p>
</div>

<!-- CHAT -->
<div id="chat-screen" style="display:none;">
  <div class="sidebar">

    <h3>الرومز</h3>
    <ul id="roomList"></ul>

    <input id="newRoom" placeholder="روم جديد">
    <button id="createRoomBtn">إنشاء</button>

    <h3>أونلاين</h3>
    <ul id="onlineUsers"></ul>

  </div>

  <div class="chat-area">
    <h2 id="roomTitle"></h2>

    <ul id="messages"></ul>

    <div class="input-area">
      <input id="msg" placeholder="اكتب رسالة..." />
      <button id="send">إرسال</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
